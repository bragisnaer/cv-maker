// ════════════════════════════════════════════════════════════════
//  Helpers
// ════════════════════════════════════════════════════════════════
function setPath(obj, path, value) {
  const root = Array.isArray(obj) ? obj.slice() : { ...obj };
  let cur = root;
  for (let i = 0; i < path.length - 1; i++) {
    const k = path[i];
    const child = cur[k];
    cur[k] = Array.isArray(child) ? child.slice() : { ...child };
    cur = cur[k];
  }
  cur[path[path.length - 1]] = value;
  return root;
}

function deepMerge(base, override) {
  if (override == null) return base;
  if (typeof base !== 'object' || typeof override !== 'object') return override;
  if (Array.isArray(override)) return override; // arrays replace
  const out = { ...base };
  for (const k in override) {
    out[k] = (k in base) ? deepMerge(base[k], override[k]) : override[k];
  }
  return out;
}

// ── IndexedDB for image bytes (avoids 5MB localStorage cap) ─────
const IDB_DB = 'cv-bragi';
const IDB_STORE = 'images';
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_DB, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const r = tx.objectStore(IDB_STORE).get(key);
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => rej(r.error);
    });
  } catch { return null; }
}
async function idbPut(key, value) {
  try {
    const db = await idbOpen();
    return await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      const r = tx.objectStore(IDB_STORE).put(value, key);
      r.onsuccess = () => res();
      r.onerror = () => rej(r.error);
    });
  } catch {}
}
async function idbDel(key) {
  try {
    const db = await idbOpen();
    return await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      const r = tx.objectStore(IDB_STORE).delete(key);
      r.onsuccess = () => res();
      r.onerror = () => rej(r.error);
    });
  } catch {}
}

// ── Named profile slots ─────────────────────────────────────────
const PROFILES_KEY = 'cv-profiles';
const ACTIVE_KEY = 'cv-active';
const DEFAULT_PROFILE = 'Base CV';
const headshotKeyFor = (name) => `headshot:${name}`;

function loadProfiles() {
  try {
    const raw = localStorage.getItem(PROFILES_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p && typeof p === 'object' && Object.keys(p).length) return p;
    }
  } catch {}
  return null;
}
function saveProfiles(p) {
  try { localStorage.setItem(PROFILES_KEY, JSON.stringify(p)); } catch {}
}
function persistActive(name) {
  try { localStorage.setItem(ACTIVE_KEY, name); } catch {}
}
function loadActive(profiles) {
  const a = localStorage.getItem(ACTIVE_KEY);
  if (a && profiles[a]) return a;
  return Object.keys(profiles)[0];
}
// ── Job applications ────────────────────────────────────────────
const APPS_KEY = 'cv-applications';
const appHeadshotKeyFor = (id) => `app-headshot:${id}`;
function loadApplications() {
  try {
    const raw = localStorage.getItem(APPS_KEY);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v)) return v;
    }
  } catch {}
  return [];
}
function saveApplications(list) {
  try { localStorage.setItem(APPS_KEY, JSON.stringify(list)); }
  catch (e) { console.warn('saveApplications failed', e); }
}
async function createApplicationFromCurrent(cv, headshotSrc, activeProfile) {
  const id = (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
  let headshotKey = null;
  if (headshotSrc) {
    headshotKey = appHeadshotKeyFor(id);
    await idbPut(headshotKey, headshotSrc);
  }
  const now = new Date().toISOString();
  return {
    id,
    company: '',
    role: cv.title || '',
    postingUrl: '',
    appliedDate: '',
    status: 'drafting',
    notes: '',
    createdAt: now,
    updatedAt: now,
    sourceProfile: activeProfile,
    snapshot: {
      cv: JSON.parse(JSON.stringify(cv)),
      headshotKey,
    },
  };
}

// Sync migration of cv-data → profiles. Headshot migration runs async on mount.
function ensureProfiles() {
  let profiles = loadProfiles();
  if (!profiles) {
    let cv = SEED_CV;
    try {
      const old = localStorage.getItem('cv-data');
      if (old) cv = deepMerge(SEED_CV, JSON.parse(old));
    } catch {}
    profiles = { [DEFAULT_PROFILE]: { cv } };
    saveProfiles(profiles);
    persistActive(DEFAULT_PROFILE);
    try { localStorage.removeItem('cv-data'); } catch {}
  }
  return profiles;
}

// ════════════════════════════════════════════════════════════════
//  Editable primitives
// ════════════════════════════════════════════════════════════════
function Ed({ value, onChange, style = {}, tag: T = 'span', multiline = false, placeholder }) {
  const ref = React.useRef(null);
  const lastExternal = React.useRef(value);
  const editable = !!window.__EDIT_ON;

  React.useEffect(() => {
    if (ref.current && lastExternal.current !== value && document.activeElement !== ref.current) {
      ref.current.textContent = value ?? '';
      lastExternal.current = value;
    }
  }, [value]);

  return (
    <T
      ref={ref}
      contentEditable={editable}
      suppressContentEditableWarning
      onBlur={(e) => {
        const next = multiline ? e.currentTarget.innerText : e.currentTarget.textContent;
        lastExternal.current = next;
        onChange && onChange(next);
      }}
      onKeyDown={(e) => {
        if (!multiline && e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); }
        // Block bold/italic/underline shortcuts so contenteditable stays plain text
        if ((e.metaKey || e.ctrlKey) && ['b', 'i', 'u'].includes(e.key.toLowerCase())) {
          e.preventDefault();
        }
      }}
      onPaste={(e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text/plain');
        document.execCommand('insertText', false, text);
      }}
      data-ed={editable ? 'on' : 'off'}
      data-placeholder={placeholder}
      style={{ outline: 'none', ...style }}
    >
      {value}
    </T>
  );
}

function EdDotList({ items, onChange, ink, inkSoft }) {
  const editable = !!window.__EDIT_ON;
  return (
    <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 5 }}>

          <span style={{ position: 'absolute', left: 0, top: 7, width: 4, height: 1, background: ink }} />
          <Ed value={c} onChange={(v) => {
            const next = items.slice();
            if (v.trim()) next[i] = v; else next.splice(i, 1);
            onChange(next);
          }} style={{ flex: 1 }} />
        </li>
      ))}
      {editable && (
        <li className="screen-only" style={{ fontSize: 9, color: '#999', paddingLeft: 10, cursor: 'pointer' }}
            onClick={() => onChange([...items, 'New item'])}>+ add</li>
      )}
    </ul>
  );
}

// ════════════════════════════════════════════════════════════════
//  Headshot editor — upload, shape crop, pan, zoom, resize
// ════════════════════════════════════════════════════════════════
function HeadshotEditor({ src, transform, onTransformChange, onSrcChange, onClear }) {
  const editable = !!window.__EDIT_ON;
  const t = transform || { shape: 'rounded', align: 'left', x: 0, y: 0, scale: 1, size: 144 };
  const align = t.align || 'left';
  const shape = SHAPES.find(s => s.id === t.shape) || SHAPES[1];
  const inputRef = React.useRef(null);
  const frameRef = React.useRef(null);
  const imgRef = React.useRef(null);
  const [imgDim, setImgDim] = React.useState(null); // {w, h}
  const [dragging, setDragging] = React.useState(false);

  // Min scale = cover-fit; max scale = 8x cover. Pan clamped so image always covers frame.
  const minScale = imgDim ? Math.max(t.size / imgDim.w, t.size / imgDim.h) : 0.1;
  const maxScale = imgDim ? minScale * 8 : 8;
  const clamp = React.useCallback((next) => {
    if (!imgDim) return next;
    const minS = Math.max(next.size / imgDim.w, next.size / imgDim.h);
    const maxS = minS * 8;
    const scale = Math.max(minS, Math.min(maxS, next.scale));
    const w = imgDim.w * scale, h = imgDim.h * scale;
    const x = Math.max(next.size - w, Math.min(0, next.x));
    const y = Math.max(next.size - h, Math.min(0, next.y));
    return { ...next, scale, x, y };
  }, [imgDim]);
  const apply = (next) => onTransformChange(clamp(next));

  // Whenever frame size or image dim changes, re-clamp current transform
  React.useEffect(() => {
    if (!imgDim) return;
    const c = clamp(t);
    if (c.scale !== t.scale || c.x !== t.x || c.y !== t.y) onTransformChange(c);
  }, [imgDim, t.size]);

  // Pick file → dataURL
  const handleFile = (file) => {
    if (!file || !onSrcChange) return;
    const reader = new FileReader();
    reader.onload = (e) => onSrcChange(e.target.result);
    reader.readAsDataURL(file);
  };
  const onPick = (e) => handleFile(e.target.files && e.target.files[0]);
  const onDrop = (e) => {
    e.preventDefault();
    handleFile(e.dataTransfer.files && e.dataTransfer.files[0]);
  };

  // Once image loads, capture natural dim and cover-fit if transform looks fresh
  const onImgLoad = () => {
    const im = imgRef.current;
    if (!im) return;
    const w = im.naturalWidth, h = im.naturalHeight;
    setImgDim({ w, h });
    if (t.x === 0 && t.y === 0 && t.scale === 1) {
      const cover = Math.max(t.size / w, t.size / h);
      onTransformChange({ ...t, scale: cover, x: (t.size - w * cover) / 2, y: (t.size - h * cover) / 2 });
    }
  };

  // Pointer drag for pan
  const dragState = React.useRef(null);
  const onPointerDown = (e) => {
    if (!editable || !src) return;
    e.preventDefault();
    frameRef.current.setPointerCapture(e.pointerId);
    dragState.current = { startX: e.clientX, startY: e.clientY, ox: t.x, oy: t.y };
    setDragging(true);
  };
  const onPointerMove = (e) => {
    if (!dragState.current) return;
    const dx = e.clientX - dragState.current.startX;
    const dy = e.clientY - dragState.current.startY;
    apply({ ...t, x: dragState.current.ox + dx, y: dragState.current.oy + dy });
  };
  const onPointerUp = (e) => {
    dragState.current = null;
    setDragging(false);
    try { frameRef.current.releasePointerCapture(e.pointerId); } catch {}
  };

  // Wheel = zoom around cursor
  const onWheel = (e) => {
    if (!editable || !src || !imgDim) return;
    e.preventDefault();
    const rect = frameRef.current.getBoundingClientRect();
    const px = e.clientX - rect.left, py = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
    const newScale = t.scale * factor;
    const imgX = (px - t.x) / t.scale;
    const imgY = (py - t.y) / t.scale;
    apply({ ...t, scale: newScale, x: px - imgX * newScale, y: py - imgY * newScale });
  };

  // Zoom slider = scale around frame center
  const onZoomSlider = (val) => {
    if (!imgDim) { onTransformChange({ ...t, scale: val }); return; }
    const cx = t.size / 2, cy = t.size / 2;
    const imgX = (cx - t.x) / t.scale;
    const imgY = (cy - t.y) / t.scale;
    apply({ ...t, scale: val, x: cx - imgX * val, y: cy - imgY * val });
  };

  // Frame resize handle
  const resizeState = React.useRef(null);
  const onResizeDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    resizeState.current = { startX: e.clientX, startY: e.clientY, oSize: t.size };
    window.addEventListener('pointermove', onResizeMove);
    window.addEventListener('pointerup', onResizeUp);
  };
  const onResizeMove = (e) => {
    if (!resizeState.current) return;
    const d = Math.max(e.clientX - resizeState.current.startX, e.clientY - resizeState.current.startY);
    const next = Math.max(60, Math.min(220, resizeState.current.oSize + d));
    apply({ ...t, size: next });
  };
  const onResizeUp = () => {
    resizeState.current = null;
    window.removeEventListener('pointermove', onResizeMove);
    window.removeEventListener('pointerup', onResizeUp);
  };

  // Recenter button
  const onRecenter = () => {
    if (!imgDim) { onTransformChange({ ...t, x: 0, y: 0, scale: 1 }); return; }
    const cover = Math.max(t.size / imgDim.w, t.size / imgDim.h);
    onTransformChange({ ...t, scale: cover, x: (t.size - imgDim.w * cover) / 2, y: (t.size - imgDim.h * cover) / 2 });
  };

  const justify = align === 'right' ? 'flex-end' : align === 'center' ? 'center' : 'flex-start';

  return (
    <div style={{ marginBottom: 20, display: 'flex', flexDirection: 'column', alignItems: justify }}>
      <div style={{ position: 'relative', width: t.size, height: t.size }}>
        <div
          ref={frameRef}
          className={`hs-frame ${!src ? 'empty' : ''} ${editable ? 'editing' : ''} ${dragging ? 'dragging' : ''}`}
          style={{ width: t.size, height: t.size, clipPath: shape.clip, WebkitClipPath: shape.clip }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerUp}
          onWheel={onWheel}
          onClick={(e) => {
            if (!editable || src) return;
            inputRef.current && inputRef.current.click();
          }}
          onDragOver={(e) => editable && e.preventDefault()}
          onDrop={editable ? onDrop : undefined}
        >
          {src ? (
            <img
              ref={imgRef}
              src={src}
              alt=""
              draggable={false}
              onLoad={onImgLoad}
              style={{
                width: imgDim ? imgDim.w : 'auto',
                height: imgDim ? imgDim.h : 'auto',
                transform: `translate(${t.x}px, ${t.y}px) scale(${t.scale})`,
              }}
            />
          ) : (
            <span>[ HEADSHOT<br/>click to upload ]</span>
          )}
          <input ref={inputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={onPick} />
        </div>
        {editable && src && <div className="hs-resize screen-only" onPointerDown={onResizeDown} title="Resize frame" />}
      </div>

      {editable && (
        <div className="hs-tools screen-only" style={{ alignItems: justify, width: '100%' }}>
          <div className="shapes" style={{ justifyContent: justify }}>
            {SHAPES.map(s => (
              <button key={s.id} type="button"
                className={`shape-btn ${s.id === t.shape ? 'active' : ''}`}
                onClick={() => onTransformChange({ ...t, shape: s.id })}
                title={s.label}>
                <svg viewBox="0 0 16 16">{s.icon}</svg>
              </button>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 4, justifyContent: justify }}>
            {[
              { id: 'left',   label: 'L', icon: <><rect x="1" y="3" width="6" height="10" /><rect x="9" y="5" width="6" height="2" opacity=".4" /><rect x="9" y="9" width="6" height="2" opacity=".4" /></> },
              { id: 'center', label: 'C', icon: <><rect x="5" y="3" width="6" height="10" /><rect x="1" y="5" width="3" height="2" opacity=".4" /><rect x="12" y="5" width="3" height="2" opacity=".4" /><rect x="1" y="9" width="3" height="2" opacity=".4" /><rect x="12" y="9" width="3" height="2" opacity=".4" /></> },
              { id: 'right',  label: 'R', icon: <><rect x="9" y="3" width="6" height="10" /><rect x="1" y="5" width="6" height="2" opacity=".4" /><rect x="1" y="9" width="6" height="2" opacity=".4" /></> },
            ].map(a => (
              <button key={a.id} type="button"
                className={`shape-btn ${align === a.id ? 'active' : ''}`}
                onClick={() => onTransformChange({ ...t, align: a.id })}
                title={`Align ${a.id}`}>
                <svg viewBox="0 0 16 16">{a.icon}</svg>
              </button>
            ))}
          </div>
          {src && (
            <>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontSize: 9, color: V1_MUTED, fontFamily: V1_MONO, width: 28 }}>zoom</span>
                <input type="range" min={minScale} max={maxScale} step={(maxScale - minScale) / 200 || 0.01} value={t.scale}
                  onChange={(e) => onZoomSlider(parseFloat(e.target.value))} />
              </div>
              <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: justify }}>
                <button type="button" className="ghost" onClick={() => inputRef.current && inputRef.current.click()}>Replace</button>
                <button type="button" className="ghost" onClick={onRecenter}>Re-center</button>
                <button type="button" className="ghost" onClick={onClear}>Remove</button>
              </div>
            </>
          )}
          {!src && (
            <button type="button" className="ghost" onClick={() => inputRef.current && inputRef.current.click()}>Upload image</button>
          )}
        </div>
      )}
    </div>
  );
}

function BulletBtn({ label, onClick, disabled, title }) {
  return (
    <button type="button"
      onClick={(e) => { e.stopPropagation(); if (!disabled) onClick(); }}
      onMouseDown={(e) => e.preventDefault()}
      disabled={disabled} title={title || label}
      style={{
        width: 16, height: 16, padding: 0, fontSize: 11, lineHeight: 1,
        background: '#fff', color: disabled ? '#ccc' : '#333',
        border: '1px solid #d8d4cb', borderRadius: 3,
        cursor: disabled ? 'default' : 'pointer', fontFamily: V1_MONO,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      }}>{label}</button>

function V1Role({ role, onRole, onDelete, last, ink, bulletAttr, flowRoleId, flowStartIdx = 0, companyLocation }) {
  const editable = !!window.__EDIT_ON;
  const setBullet = (i, v) => {
    const next = role.bullets.slice();
    if (v.trim()) next[i] = v; else next.splice(i, 1);
    onRole({ ...role, bullets: next });
  };
  const moveBullet = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= role.bullets.length) return;
    const next = role.bullets.slice();
    [next[i], next[j]] = [next[j], next[i]];
    onRole({ ...role, bullets: next });
  };
  const removeBullet = (i) => {
    const next = role.bullets.slice();
    next.splice(i, 1);
    onRole({ ...role, bullets: next });
  };
  return (
    <div style={{ marginBottom: last ? 0 : 13, position: 'relative' }} className="role-block">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: (role.location || companyLocation) ? 1 : 5, gap: 8 }}>
        <Ed value={role.title} onChange={(v) => onRole({ ...role, title: v })}
          style={{ fontSize: 11.5, fontWeight: 600, color: ink, letterSpacing: -0.1, flex: 1 }} />
        <Ed value={role.dates} onChange={(v) => onRole({ ...role, dates: v })}
          style={{ fontSize: 9, color: V1_MUTED, fontFamily: V1_MONO, flexShrink: 0 }} />
        {editable && onDelete && (
          <button type="button" className="screen-only role-del" onClick={(e) => { e.stopPropagation(); if (confirm('Delete this role and all its bullets?')) onDelete(); }}
            title="Delete role"
            style={{ flexShrink: 0, border: '1px solid #d8d4cb', background: '#fff', color: '#999', cursor: 'pointer', fontSize: 11, lineHeight: 1, width: 18, height: 18, padding: 0, borderRadius: 3, fontFamily: V1_MONO, opacity: 0, transition: 'opacity 120ms' }}>×</button>
        )}
      </div>
      {(role.location || companyLocation || editable) && (
        <Ed tag="div" value={role.location || companyLocation || ''} onChange={(v) => onRole({ ...role, location: v })}
          style={{ fontSize: 9.5, color: V1_MUTED, marginBottom: 5, fontStyle: 'italic', minHeight: editable ? '1em' : 0 }} />
      )}
      <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 5 }}>
        {role.bullets.map((b, i) => (
          <li key={i}
            {...(bulletAttr ? { [bulletAttr]: '' } : {})}
            {...(flowRoleId != null ? { 'data-flow-role': flowRoleId, 'data-flow-idx': flowStartIdx + i } : {})}
            style={{ fontSize: 10.25, lineHeight: 1.5, paddingLeft: 14, position: 'relative', color: V1_INK_SOFT, textWrap: 'pretty' }}>
            <span style={{ position: 'absolute', left: 0, top: 7, width: 6, height: 1, background: ink }} />
            <Ed value={b} onChange={(v) => setBullet(i, v)} multiline />
            {editable && (
              <span className="screen-only bullet-reorder" style={{
                position: 'absolute', right: -2, top: 0, display: 'inline-flex',
                gap: 2, alignItems: 'center', opacity: 0, transition: 'opacity 120ms',
              }}>
                <BulletBtn label="↑" disabled={i === 0} onClick={() => moveBullet(i, -1)} title="Move up" />
                <BulletBtn label="↓" disabled={i === role.bullets.length - 1} onClick={() => moveBullet(i, 1)} title="Move down" />
                <BulletBtn label="×" onClick={() => removeBullet(i)} title="Remove" />
              </span>
            )}
          </li>
        ))}
        {editable && (
          <li className="screen-only" style={{ fontSize: 9, color: '#999', paddingLeft: 14, cursor: 'pointer' }}
              onClick={() => onRole({ ...role, bullets: [...role.bullets, 'New bullet'] })}>+ add bullet</li>
        )}
      </ul>
    </div>
  );
}

function useSidebarSplit(visibleIds, availableP1, refs) {
  const [splitIdx, setSplitIdx] = React.useState(visibleIds.length);
  React.useLayoutEffect(() => {
    let used = 0, idx = visibleIds.length;
    const SECTION_MARGIN = 16;
    for (let i = 0; i < visibleIds.length; i++) {
      const el = refs.current[visibleIds[i]];
      const h = (el ? el.offsetHeight : 0) + SECTION_MARGIN;
      if (used + h > availableP1) { idx = i; break; }
      used += h;
    }
    setSplitIdx(idx);
  });
  return splitIdx;
}

function V1MetricRail({ metrics, update, ink }) {

    const next = metrics.slice();
    next.splice(i, 1);
    update(['metrics'], next);

    update(['metrics'], [...(metrics || []), { value: '0', unit: 'unit', label: 'New callout' }]);

  return (
    <div style={{ marginBottom: 16 }}>
      {metrics.length > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gap: 18, rowGap: 14, padding: '2px 0 18px' }}>
          {metrics.map((m, i) => (

              <Ed tag="div" value={m.value} onChange={(v) => update(['metrics', i, 'value'], v)}

              <Ed tag="div" value={m.unit} onChange={(v) => update(['metrics', i, 'unit'], v)}

          ))}
        </div>
      )}

function deleteRoleFn(cv, update, ci, ri) {
  const company = cv.experience[ci];
  const next = company.roles.slice();
  next.splice(ri, 1);
  if (next.length === 0) {
    const exps = cv.experience.slice();
    exps.splice(ci, 1);
    update(['experience'], exps);
  } else {
    update(['experience', ci, 'roles'], next);
  }
}

// One-shot seed — used when sender.lines is empty. After first edit the
// returned shape gets persisted and this seed never runs again for that profile.
function seedSenderLines(cv) {
  const c = cv.contact || {};
  return [
    { id: 'name',     value: cv.name     || '' },
    { id: 'address',  value: c.location  || '' },
    { id: 'phone',    value: c.phone     || '' },
    { id: 'email',    value: c.email     || '' },
    { id: 'linkedin', value: c.linkedin  || '' },
  ];
}
function getSenderLines(cv) {
  const s = (cv.coverLetter && cv.coverLetter.sender) || {};
  if (Array.isArray(s.lines) && s.lines.length) return s.lines;
  return seedSenderLines(cv);
}
function todayFormatted() {
  return new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

const lineCtrlBtn = {
  width: 14, height: 14, padding: 0, fontSize: 10, lineHeight: 1,
  background: '#fff', color: '#666',
  border: '1px solid #d8d4cb', borderRadius: 2, cursor: 'pointer',
  fontFamily: V1_MONO, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
};

function CoverLetterDocument({ cv, update }) {
  const editable = !!window.__EDIT_ON;
  const ink = (cv.theme && cv.theme.ink) || '#1a2a3a';
  const side = (cv.theme && cv.theme.side) || '#f4efe6';
  const cl = cv.coverLetter || {};
  const recipient = cl.recipient || {};
  const setRecipient = (key, val) => update(['coverLetter', 'recipient', key], val);
  const setCl = (key, val) => update(['coverLetter', key], val);
  const dateValue = cl.date || todayFormatted();

  const lines = getSenderLines(cv);
  const setLines = (next) => update(['coverLetter', 'sender', 'lines'], next);
  const editLine = (i, value) => setLines(lines.map((l, idx) => idx === i ? { ...l, value } : l));
  const removeLine = (i) => setLines(lines.filter((_, idx) => idx !== i));
  const moveLine = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= lines.length) return;
    const next = lines.slice();
    [next[i], next[j]] = [next[j], next[i]];
    setLines(next);
  };
  const addLine = () => setLines([...lines, { id: `custom_${Date.now()}`, value: '' }]);

  const nameLine = lines.find(l => l.id === 'name');
  const signNameValue = cl.signName || (nameLine && nameLine.value) || '';

  const lineStyle = (id) => id === 'name'
    ? { fontFamily: V1_FONT, fontSize: 22, fontWeight: 600, letterSpacing: -0.4, color: ink, marginBottom: 6, lineHeight: 1.1 }
    : { color: V1_MUTED };

  return (
    <CVPage>
      <div style={{ display: 'flex', height: '100%' }}>
        <div style={{ width: 32, background: side, flexShrink: 0 }} aria-hidden />
        <div style={{
          flex: 1, padding: '60px 64px 56px', fontFamily: V1_FONT, color: V1_INK_SOFT,
          display: 'flex', flexDirection: 'column', boxSizing: 'border-box',
        }}>
          {/* Sender block — top right */}
          <div style={{ display: 'flex', justifyContent: 'flex-end' }} title="Sender lines — add/remove/reorder freely.">
            <div style={{ textAlign: 'right', fontSize: 10.5, lineHeight: 1.55, color: V1_INK_SOFT, minWidth: 200 }}>
              {lines.map((l, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 4 }}>
                  {editable && (
                    <span className="screen-only" style={{ display: 'inline-flex', gap: 2, opacity: 0.6 }}>
                      <button onClick={() => moveLine(i, -1)} disabled={i === 0} title="Up"
                        style={lineCtrlBtn}>↑</button>
                      <button onClick={() => moveLine(i, 1)} disabled={i === lines.length - 1} title="Down"
                        style={lineCtrlBtn}>↓</button>
                      <button onClick={() => removeLine(i)} title="Remove line"
                        style={{ ...lineCtrlBtn, color: '#c96442' }}>×</button>
                    </span>
                  )}
                  <Ed tag="div"
                    value={l.value}
                    onChange={(v) => editLine(i, v)}
                    style={lineStyle(l.id)} />
                </div>
              ))}
              {editable && (
                <button type="button" className="add-link screen-only"
                  onClick={addLine}
                  style={{ marginTop: 4, background: 'transparent', border: 'none', fontSize: 9, color: '#999', cursor: 'pointer', padding: '2px 0' }}>
                  + add line
                </button>
              )}
            </div>
          </div>

          {/* Date — right-aligned, below sender */}
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 18 }}>
            <Ed tag="div"
              value={dateValue}
              onChange={(v) => setCl('date', v)}
              style={{ fontSize: 10.5, color: V1_MUTED, fontFamily: V1_MONO, letterSpacing: 0.2 }} />
          </div>

          {/* Recipient block */}
          <div style={{ marginTop: 36, fontSize: 10.5, lineHeight: 1.55 }}>
            <Ed tag="div" value={recipient.name || ''} onChange={(v) => setRecipient('name', v)}
              placeholder="Recipient name"
              style={{ fontWeight: 600, color: ink, fontSize: 11.5 }} />
            <Ed tag="div" value={recipient.title || ''} onChange={(v) => setRecipient('title', v)}
              placeholder="Recipient title"
              style={{ color: V1_INK_SOFT }} />
            <Ed tag="div" value={recipient.company || ''} onChange={(v) => setRecipient('company', v)}
              placeholder="Company name"
              style={{ color: V1_INK_SOFT }} />
            <Ed tag="div" value={recipient.address || ''} onChange={(v) => setRecipient('address', v)}
              placeholder="Company address"
              style={{ color: V1_MUTED }} />
          </div>

          {/* Subject */}
          <Ed tag="div"
            value={cl.subject || ''}
            onChange={(v) => setCl('subject', v)}
            placeholder="Subject — e.g. Application for [role] at [company]"
            style={{
              marginTop: 28, fontSize: 12, fontWeight: 600, color: ink,
              letterSpacing: -0.05, textTransform: 'none',
            }} />

          {/* Salutation */}
          <Ed tag="div"
            value={cl.salutation || ''}
            onChange={(v) => setCl('salutation', v)}
            style={{ marginTop: 22, fontSize: 11, color: V1_INK_SOFT }} />

          {/* Body */}
          <Ed tag="div"
            value={cl.body || ''}
            onChange={(v) => setCl('body', v)}
            multiline
            style={{
              marginTop: 14, fontSize: 11, lineHeight: 1.65,
              color: V1_INK_SOFT, letterSpacing: -0.01,
              whiteSpace: 'pre-wrap', textWrap: 'pretty',
            }} />

          {/* Signoff */}
          <div style={{ marginTop: 14 }}>
            <Ed tag="div"
              value={cl.signoff || ''}
              onChange={(v) => setCl('signoff', v)}
              style={{ fontSize: 11, color: V1_INK_SOFT }} />
            <Ed tag="div"
              value={signNameValue}
              onChange={(v) => setCl('signName', v)}
              style={{ marginTop: 18, fontSize: 11, fontWeight: 600, color: ink }} />
          </div>
        </div>
      </div>
    </CVPage>
  );
}

function CVDocument({ cv, update, headshotSrc, onHeadshotSrc, onHeadshotTransform, onHeadshotClear }) {
  const ink = (cv.theme && cv.theme.ink) || '#1a2a3a';
  const side = (cv.theme && cv.theme.side) || '#f4efe6';

  const AVAIL_P1 = 700;
  const measureRefs = React.useRef({});
  const visibleIds = cv.sidebar.filter(s => s.visible).map(s => s.id);
  const splitIdx = useSidebarSplit(visibleIds, AVAIL_P1, measureRefs);

  const ppm = cv.experience[0] && cv.experience[0].roles[0];
  const om = cv.experience[0] && cv.experience[0].roles[1];
  const measureMainRef = React.useRef(null);
  const [ppmSplitIdx, setPpmSplitIdx] = React.useState(ppm ? ppm.bullets.length : 0);
  const [omSplitIdx, setOmSplitIdx] = React.useState(om ? om.bullets.length : 0);

  React.useLayoutEffect(() => {
    const root = measureMainRef.current;
    if (!root || !ppm) return;
    const PAGE_H = A4_H, BOTTOM_PAD = 32;
    const limit = PAGE_H - BOTTOM_PAD;
    const rootTop = root.getBoundingClientRect().top;
    const ppmLis = root.querySelectorAll('li[data-flow-role="ppm"]');
    const omLis = root.querySelectorAll('li[data-flow-role="om"]');
    let ppmFit = ppm.bullets.length, omFit = om ? om.bullets.length : 0, overflowed = false;
    for (let i = 0; i < ppmLis.length; i++) {
      const r = ppmLis[i].getBoundingClientRect();
      if (r.bottom - rootTop > limit) { ppmFit = i; overflowed = true; break; }
    }
    if (overflowed) { omFit = 0; }
    else if (om) {
      for (let i = 0; i < omLis.length; i++) {
        const r = omLis[i].getBoundingClientRect();
        if (r.bottom - rootTop > limit) { omFit = i; break; }
      }
    }
    if (ppmFit !== ppmSplitIdx) setPpmSplitIdx(ppmFit);
    if (omFit !== omSplitIdx) setOmSplitIdx(omFit);
  });

  return (
    <>
      <div className="screen-only">
        <MeasurementSidebar cv={cv} update={update} measureRefs={measureRefs} ink={ink} side={side} />
        <div aria-hidden style={{ position: 'absolute', left: -9999, top: 0, width: A4_W - 240, visibility: 'hidden', pointerEvents: 'none' }} ref={measureMainRef}>
          <V1MainP1 cv={cv} update={() => {}} ink={ink} ppmSplitIdx={ppm ? ppm.bullets.length : 0} omSplitIdx={om ? om.bullets.length : 0} />
        </div>
      </div>
      <CVPage>
        <div style={{ display: 'flex', height: '100%' }}>
          <V1Sidebar cv={cv} update={update} page={1} splitIdx={splitIdx} ink={ink} side={side}
            headshotSrc={headshotSrc} onHeadshotSrc={onHeadshotSrc}
            onHeadshotTransform={onHeadshotTransform} onHeadshotClear={onHeadshotClear} />
          <V1MainP1 cv={cv} update={update} ink={ink} ppmSplitIdx={ppmSplitIdx} omSplitIdx={omSplitIdx} />
        </div>
      </CVPage>
      <PageBreakMarker index={0} />
      <CVPage>
        <div style={{ display: 'flex', height: '100%' }}>
          <V1Sidebar cv={cv} update={update} page={2} splitIdx={splitIdx} ink={ink} side={side} />
          <V1MainP2 cv={cv} update={update} ink={ink} ppmSplitIdx={ppmSplitIdx} omSplitIdx={omSplitIdx} />
        </div>
      </CVPage>
    </>
  );
}

function Toolbar({ editOn, setEditOn, onPrint, onExport, onImport, onReset,

                 borderRadius: 6, padding: '5px 8px', font: 'inherit', fontSize: 12, maxWidth: 180 }}>

function TweaksPanel({ editOn, cv, update, headshotSrc }) {
  if (!editOn) return null;
  const [collapsed, setCollapsed] = React.useState(() => {
    try { return localStorage.getItem('cv-tweaks-collapsed') === '1'; } catch { return false; }
  });
  const toggleCollapsed = () => {
    setCollapsed(c => {
      const next = !c;
      try { localStorage.setItem('cv-tweaks-collapsed', next ? '1' : '0'); } catch {}
      return next;
    });
  };
  if (collapsed) {
    return (
      <button type="button" onClick={toggleCollapsed} title="Show tweaks"
        style={{
          position: 'fixed', bottom: 16, right: 16, zIndex: 1000,
          background: '#17181a', color: '#fff', border: '1px solid #3a342d',
          borderRadius: 999, padding: '8px 14px', fontSize: 12, cursor: 'pointer',
          boxShadow: '0 6px 24px rgba(0,0,0,.25)', fontFamily: 'inherit',
          display: 'inline-flex', alignItems: 'center', gap: 6,
        }}>
        ⚙ Tweaks
      </button>
    );
  }
  const sidebar = cv.sidebar || [];
  const theme = cv.theme || {};
  const setSection = (i, patch) => update(['sidebar'], sidebar.map((s, idx) => idx === i ? { ...s, ...patch } : s));
  const moveSection = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= sidebar.length) return;
    const next = sidebar.slice();
    [next[i], next[j]] = [next[j], next[i]];
    update(['sidebar'], next);
  };
  const duplicateSection = (i) => {
    const src = sidebar[i];
    const srcKind = src.kind || src.id;
    const srcDataKey = src.dataKey || srcKind;
    let n = 2;
    while (sidebar.some(s => s.id === `${src.id}_${n}`)) n++;
    const newId = `${src.id}_${n}`;
    let m = 2;
    while (cv[`${srcDataKey}_${m}`] !== undefined) m++;
    const newDataKey = `${srcDataKey}_${m}`;
    const srcData = cv[srcDataKey];
    const cloned = srcData == null
      ? (srcKind === 'additional' ? '' : [])
      : (typeof srcData === 'string' ? srcData : JSON.parse(JSON.stringify(srcData)));
    update([newDataKey], cloned);
    const next = sidebar.slice();
    next.splice(i + 1, 0, {
      id: newId, kind: srcKind, dataKey: newDataKey,
      title: `${src.title} (copy)`, visible: true,
    });
    update(['sidebar'], next);
  };
  const deleteSection = (i) => {
    const s = sidebar[i];
    if (!s.dataKey) return; // only allow deleting duplicates
    if (!confirm(`Delete section "${s.title}"?`)) return;
    update(['sidebar'], sidebar.filter((_, idx) => idx !== i));
    // Note: leaves cv[s.dataKey] orphaned; harmless, no UI references it.
  };
  return (
    <div className="tweaks-panel">
      <button type="button" onClick={toggleCollapsed} title="Hide tweaks"
        style={{
          position: 'absolute', top: 2, right: 2,
          width: 32, height: 32, padding: 0, lineHeight: 1,
          background: 'transparent', border: 'none', color: '#fff',
          opacity: 0.6, cursor: 'pointer', fontSize: 18,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          zIndex: 2,
        }}>×</button>
      <h4>Color scheme</h4>
      <div className="swatches">
        {COLOR_SCHEMES.map(s => (
          <div key={s.id} className={`swatch ${theme.ink === s.ink && theme.side === s.side ? 'active' : ''}`}
            title={s.name} onClick={() => update(['theme'], { ink: s.ink, side: s.side })}>
            <div className="ink" style={{ background: s.ink }} />
            <div className="side" style={{ background: s.side }} />
          </div>
        ))}
      </div>
      <div className="row" style={{ marginTop: 8 }}>
        <span style={{ width: 28, opacity: 0.7 }}>ink</span>
        <input type="text" value={theme.ink || ''} onChange={(e) => update(['theme'], { ...theme, ink: e.target.value })} />
      </div>
      <div className="row">
        <span style={{ width: 28, opacity: 0.7 }}>side</span>
        <input type="text" value={theme.side || ''} onChange={(e) => update(['theme'], { ...theme, side: e.target.value })} />
      </div>

      <div className="group">
        <h4>Sidebar sections</h4>
        {sidebar.map((s, i) => (
          <div key={s.id} className="row">
            <input type="checkbox" checked={!!s.visible} onChange={(e) => setSection(i, { visible: e.target.checked })} />
            <input type="text" value={s.title} onChange={(e) => setSection(i, { title: e.target.value })} disabled={!s.visible} />
            <span className="reorder">
              <button onClick={() => moveSection(i, -1)} disabled={i === 0} title="Up">↑</button>
              <button onClick={() => moveSection(i, 1)} disabled={i === sidebar.length - 1} title="Down">↓</button>
              <button onClick={() => duplicateSection(i)} title="Duplicate section (independent copy)">⧉</button>
              {s.dataKey && (
                <button onClick={() => deleteSection(i)} title="Delete this duplicate"
                  style={{ color: '#ff8a6b' }}>×</button>
              )}
            </span>
          </div>
        ))}
      </div>

      <div className="group">
        <h4>Tips</h4>
        <div style={{ fontSize: 11, lineHeight: 1.5, opacity: 0.8 }}>
          Click any text to edit. Drag image to pan; scroll to zoom; corner handle resizes the frame; pick a shape from the icon row.
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  Applications view
// ════════════════════════════════════════════════════════════════
function StatusPill({ status }) {
  const meta = APP_STATUS_BY_ID[status] || APP_STATUS_BY_ID.drafting;
  return <span className="app-status-pill" style={{ background: meta.color }}>{meta.label}</span>;
}

function ApplicationCard({ app, expanded, onToggle, onPatch, onDelete, onView }) {
  const patch = (k, v) => onPatch({ ...app, [k]: v, updatedAt: new Date().toISOString() });
  const fmtDate = (iso) => {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString(); } catch { return iso; }
  };
  return (
    <div className={`app-card ${expanded ? 'expanded' : ''}`}>
      <div className="app-card-summary" onClick={onToggle}>
        <StatusPill status={app.status} />
        <div className="who">
          <div className="company">{app.company || <span style={{ color: '#b0aca0', fontStyle: 'italic', fontWeight: 400 }}>Untitled application</span>}</div>
          <div className="role">{app.role || '—'}</div>
        </div>
        <div className="meta">
          <span>{app.appliedDate ? `Applied ${fmtDate(app.appliedDate)}` : 'Not yet applied'}</span>
          <span className="updated">Updated {fmtDate(app.updatedAt)}</span>
        </div>
      </div>
      {expanded && <>
        <div className="app-card-body">
          <div className="field">
            <label>Company</label>
            <input type="text" value={app.company} onChange={(e) => patch('company', e.target.value)} placeholder="Acme Inc." />
          </div>
          <div className="field">
            <label>Role</label>
            <input type="text" value={app.role} onChange={(e) => patch('role', e.target.value)} placeholder="Senior PM" />
          </div>
          <div className="field full">
            <label>Posting URL</label>
            <input type="text" value={app.postingUrl} onChange={(e) => patch('postingUrl', e.target.value)} placeholder="https://..." />
          </div>
          <div className="field">
            <label>Applied date</label>
            <input type="date" value={app.appliedDate || ''} onChange={(e) => patch('appliedDate', e.target.value)} />
          </div>
          <div className="field">
            <label>Status</label>
            <select value={app.status} onChange={(e) => patch('status', e.target.value)}>
              {APP_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          <div className="field full">
            <label>Notes</label>
            <textarea value={app.notes} onChange={(e) => patch('notes', e.target.value)} placeholder="Recruiter contact, follow-up reminders, interview prep…" />
          </div>
          <div className="field full">
            <label>Source profile</label>
            <div className="source">{app.sourceProfile} · created {fmtDate(app.createdAt)}</div>
          </div>
        </div>
        <div className="app-card-actions">
          <button onClick={() => onView('cv')} title="View CV as submitted">View CV snapshot</button>
          <button onClick={() => onView('letter')} title="View cover letter as submitted">View cover letter snapshot</button>
          {app.postingUrl && <button onClick={() => window.open(app.postingUrl, '_blank', 'noopener')} title="Open posting in new tab">Open posting ↗</button>}
          <span style={{ flex: 1 }} />
          <button className="danger" onClick={onDelete}>Delete</button>
        </div>
      </>}
    </div>
  );
}

function NewApplicationForm({ profiles, defaultTemplate, onCancel, onSubmit }) {
  const names = Object.keys(profiles || {});
  const [company, setCompany] = React.useState('');
  const [position, setPosition] = React.useState('');
  const [templateName, setTemplateName] = React.useState(defaultTemplate);
  const [createNewProfile, setCreateNewProfile] = React.useState(true);
  const slug = (s) => (s || '').trim().replace(/\s+/g, '-').replace(/[^A-Za-z0-9\-]/g, '');
  const projectedName = createNewProfile
    ? `${slug(company) || 'New'}-${slug(position) || 'Role'}`
    : templateName;
  const submit = (e) => {
    if (e) e.preventDefault();
    if (!company.trim() && !position.trim()) {
      alert('Add at least a company or position before creating an application.');
      return;
    }
    onSubmit({
      company: company.trim(),
      position: position.trim(),
      templateName,
      createNewProfile,
    });
  };
  return (
    <form className="new-app-form" onSubmit={submit}>
      <div className="field">
        <label>Company</label>
        <input type="text" autoFocus value={company} onChange={(e) => setCompany(e.target.value)} placeholder="Acme Inc." />
      </div>
      <div className="field">
        <label>Position</label>
        <input type="text" value={position} onChange={(e) => setPosition(e.target.value)} placeholder="Senior Project Manager" />
      </div>
      <div className="field">
        <label>Template profile</label>
        <select value={templateName} onChange={(e) => setTemplateName(e.target.value)}>
          {names.map(n => <option key={n} value={n}>{n}</option>)}
        </select>
      </div>
      <div className="field">
        <label>Profile to use</label>
        <label className="check">
          <input type="checkbox" checked={createNewProfile} onChange={(e) => setCreateNewProfile(e.target.checked)} />
          Clone template into new profile
        </label>
        <div className="preview">→ {projectedName}</div>
      </div>
      <div className="field full actions">
        <button type="button" onClick={onCancel}>Cancel</button>
        <button type="submit" className="primary">Create application</button>
      </div>
    </form>
  );
}

function ApplicationsDocument({ apps, setApps, cv, headshotSrc, activeProfile, profiles, onView, onCreate }) {
  const [expandedId, setExpandedId] = React.useState(null);
  const [showForm, setShowForm] = React.useState(false);

  const sorted = React.useMemo(() => {
    return apps.slice().sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  }, [apps]);

  const onPatch = (patched) => {
    setApps(apps.map(a => a.id === patched.id ? patched : a));
  };
  const onDelete = async (app) => {
    if (!confirm(`Delete application for ${app.company || 'this company'}? This cannot be undone.`)) return;
    if (app.snapshot && app.snapshot.headshotKey) {
      await idbDel(app.snapshot.headshotKey);
    }
    setApps(apps.filter(a => a.id !== app.id));
    if (expandedId === app.id) setExpandedId(null);
  };
  const onViewSnap = async (app, docKind) => {
    let headshot = null;
    if (app.snapshot && app.snapshot.headshotKey) {
      headshot = await idbGet(app.snapshot.headshotKey);
    }
    onView({
      cv: deepMerge(SEED_CV, app.snapshot.cv),
      headshotSrc: headshot,
      doc: docKind,
      appLabel: `${app.company || 'Untitled'}${app.role ? ' · ' + app.role : ''}`,
    });
  };
  const onSubmitNew = async (params) => {
    const id = await onCreate(params);
    setShowForm(false);
    if (id) setExpandedId(id);
  };

  return (
    <div className="apps-shell">
      <div className="apps-header">
        <h2>Applications<span className="count">{apps.length} total</span></h2>
        {!showForm && (
          <button onClick={() => setShowForm(true)} title="Start a new application; optionally clone a template into a new profile">
            + New application
          </button>
        )}
      </div>
      {showForm && (
        <NewApplicationForm
          profiles={profiles}
          defaultTemplate={activeProfile}
          onCancel={() => setShowForm(false)}
          onSubmit={onSubmitNew}
        />
      )}
      {sorted.length === 0 && !showForm ? (
        <div className="apps-empty">
          No applications yet. Click <strong>+ New application</strong> to start one — you can clone a template profile and rename it for the role.
        </div>
      ) : (
        <div className="app-list">
          {sorted.map(app => (
            <ApplicationCard
              key={app.id}
              app={app}
              expanded={expandedId === app.id}
              onToggle={() => setExpandedId(expandedId === app.id ? null : app.id)}
              onPatch={onPatch}
              onDelete={() => onDelete(app)}
              onView={(docKind) => onViewSnap(app, docKind)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function SnapshotBanner({ snap, onClose }) {
  return (
    <div className="snapshot-banner">
      <span>Viewing snapshot — <strong>{snap.appLabel}</strong></span>
      <button onClick={onClose}>Close</button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  App root
// ════════════════════════════════════════════════════════════════
function App() {
  const [editOn, setEditOnState] = React.useState(() => {
    const saved = localStorage.getItem('cv-edit-on');
    return saved == null ? true : saved === '1';
  });
  React.useEffect(() => {
    window.__EDIT_ON = editOn;
    localStorage.setItem('cv-edit-on', editOn ? '1' : '0');
  }, [editOn]);
  // Force a re-render if global edit flag changes (Ed reads window.__EDIT_ON)
  const setEditOn = (v) => { window.__EDIT_ON = v; setEditOnState(v); };

  const [profiles, setProfiles] = React.useState(() => ensureProfiles());
  const [active, setActiveState] = React.useState(() => loadActive(ensureProfiles()));
  const [doc, setDocState] = React.useState(() => {
    const v = localStorage.getItem('cv-active-doc');
    return (v === 'letter' || v === 'applications') ? v : 'cv';
  });
  const setDoc = (v) => { setDocState(v); try { localStorage.setItem('cv-active-doc', v); } catch {} };

  // Job applications
  const [apps, setAppsState] = React.useState(() => loadApplications());
  const setApps = (next) => {
    const list = typeof next === 'function' ? next(apps) : next;
    setAppsState(list);
    saveApplications(list);
  };
  const [viewingSnapshot, setViewingSnapshot] = React.useState(null);
  // Force edit OFF while viewing a snapshot; restore prior flag on close
  const editPriorRef = React.useRef(null);
  React.useEffect(() => {
    if (viewingSnapshot) {
      editPriorRef.current = window.__EDIT_ON;
      window.__EDIT_ON = false;
      setEditOnState(false);
    } else if (editPriorRef.current != null) {
      window.__EDIT_ON = editPriorRef.current;
      setEditOnState(editPriorRef.current);
      editPriorRef.current = null;
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [viewingSnapshot]);
  const [cv, setCv] = React.useState(() => {
    const p = ensureProfiles();
    const a = loadActive(p);
    return deepMerge(SEED_CV, p[a].cv);
  });

  const update = React.useCallback((path, value) => {
    setCv(prev => {
      const next = setPath(prev, path, value);
      setProfiles(p => {
        const np = { ...p, [active]: { cv: next } };
        saveProfiles(np);
        return np;
      });
      return next;
    });
  }, [active]);

  // Headshot image bytes per profile (IDB key `headshot:<name>`)
  const [headshotSrc, setHeadshotSrc] = React.useState(null);
  // One-time migration of legacy single 'headshot' key
  React.useEffect(() => {
    (async () => {
      const old = await idbGet('headshot');
      if (!old) return;
      const existing = await idbGet(headshotKeyFor(DEFAULT_PROFILE));
      if (!existing) await idbPut(headshotKeyFor(DEFAULT_PROFILE), old);
      await idbDel('headshot');
      if (active === DEFAULT_PROFILE && !headshotSrc) setHeadshotSrc(old);
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  // Load headshot for active profile
  React.useEffect(() => {
    let cancelled = false;
    setHeadshotSrc(null);
    idbGet(headshotKeyFor(active)).then(v => { if (!cancelled) setHeadshotSrc(v || null); });
    return () => { cancelled = true; };
  }, [active]);
  const onHeadshotSrc = (dataUrl) => {
    setHeadshotSrc(dataUrl);
    idbPut(headshotKeyFor(active), dataUrl);
    // Reset transform so HeadshotEditor cover-fits the new image
    update(['headshot'], { ...cv.headshot, x: 0, y: 0, scale: 1 });
  };
  const onHeadshotTransform = (t) => update(['headshot'], t);
  const onHeadshotClear = () => {
    setHeadshotSrc(null);
    idbDel(headshotKeyFor(active));
    update(['headshot'], { ...cv.headshot, x: 0, y: 0, scale: 1 });
  };

  const slug = (s) => (s || '').trim().replace(/\s+/g, '-');
  const outputBase = () => {
    if (viewingSnapshot) {
      const namePart = slug((viewingSnapshot.cv && viewingSnapshot.cv.name) || cv.name) || 'Untitled';
      const docPart = viewingSnapshot.doc === 'letter' ? 'Cover-Letter' : 'CV';
      const labelPart = slug(viewingSnapshot.appLabel) || 'Application';
      return `${namePart}_${docPart}_${labelPart}`;
    }
    const namePart = slug(cv.name) || 'Untitled';
    const docPart = doc === 'letter' ? 'Cover-Letter' : 'CV';
    const docName = slug(active) || 'Profile';
    return `${namePart}_${docPart}_${docName}`;
  };

  // Set document title so Print/PDF default filename matches the convention.
  React.useEffect(() => {
    document.title = outputBase();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [cv.name, doc, active, viewingSnapshot]);

  const onPrint = () => { window.print(); };
  const onExport = () => {
    const payload = { cv, headshot: headshotSrc, applications: apps };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${outputBase()}.json`;
    a.click(); URL.revokeObjectURL(url);
  };
  const onImport = (text) => {
    try {
      const parsed = JSON.parse(text);
      const importedCv = parsed.cv || parsed;
      const merged = deepMerge(SEED_CV, importedCv);
      setCv(merged);
      setProfiles(p => {
        const np = { ...p, [active]: { cv: merged } };
        saveProfiles(np);
        return np;
      });
      if (parsed.headshot) {
        setHeadshotSrc(parsed.headshot);
        idbPut(headshotKeyFor(active), parsed.headshot);
      }
      if (Array.isArray(parsed.applications)) {
        if (apps.length === 0 || confirm(`Import ${parsed.applications.length} application(s)? Existing applications will be replaced.`)) {
          setApps(parsed.applications);
        }
      }
    } catch (e) { alert('Import failed: ' + e.message); }
  };
  const onReset = () => {
    if (!confirm(`Reset "${active}" to seed CV? (Other profiles untouched.)`)) return;
    setCv(SEED_CV);
    setProfiles(p => {
      const np = { ...p, [active]: { cv: SEED_CV } };
      saveProfiles(np);
      return np;
    });
  };

  // Create application — optionally cloning template into a new profile
  const onCreateApplication = async ({ company, position, templateName, createNewProfile }) => {
    const tmplName = (profiles[templateName] ? templateName : active);
    const tmplCv = deepMerge(SEED_CV, profiles[tmplName].cv);
    const tmplHeadshot = await idbGet(headshotKeyFor(tmplName));
    const slug = (s) => (s || '').trim().replace(/\s+/g, '-').replace(/[^A-Za-z0-9\-]/g, '');
    let profileName = tmplName;
    let snapshotCv = tmplCv;
    let snapshotHeadshot = tmplHeadshot;
    if (createNewProfile) {
      const baseName = `${slug(company) || 'New'}-${slug(position) || 'Role'}`;
      let finalName = baseName, n = 2;
      while (profiles[finalName]) { finalName = `${baseName}-${n++}`; }
      const clonedCv = JSON.parse(JSON.stringify(tmplCv));
      if (position) clonedCv.title = position;
      const np = { ...profiles, [finalName]: { cv: clonedCv } };
      setProfiles(np); saveProfiles(np);
      if (tmplHeadshot) await idbPut(headshotKeyFor(finalName), tmplHeadshot);
      setActiveState(finalName); persistActive(finalName);
      setCv(clonedCv);
      setHeadshotSrc(tmplHeadshot || null);
      profileName = finalName;
      snapshotCv = clonedCv;
    }
    const appShell = await createApplicationFromCurrent(snapshotCv, snapshotHeadshot || null, profileName);
    const app = { ...appShell, company: company || '', role: position || appShell.role };
    setApps([app, ...apps]);
    if (createNewProfile) {
      setDoc('cv');
    }
    return app.id;
  };

  // Profile management
  const onSwitchProfile = (name) => {
    if (!profiles[name] || name === active) return;
    setActiveState(name);
    persistActive(name);
    setCv(deepMerge(SEED_CV, profiles[name].cv));
  };
  const onSaveAs = async () => {
    const raw = prompt('Save current edits as a new profile. Name:', '');
    const name = (raw || '').trim();
    if (!name) return;
    if (profiles[name] && !confirm(`"${name}" exists. Overwrite?`)) return;
    const np = { ...profiles, [name]: { cv } };
    setProfiles(np); saveProfiles(np);
    const bytes = await idbGet(headshotKeyFor(active));
    if (bytes) await idbPut(headshotKeyFor(name), bytes);
    setActiveState(name); persistActive(name);
  };
  const onRename = async () => {
    const raw = prompt('Rename profile:', active);
    const name = (raw || '').trim();
    if (!name || name === active) return;
    if (profiles[name]) { alert(`"${name}" already exists.`); return; }
    const np = { ...profiles, [name]: profiles[active] };
    delete np[active];
    setProfiles(np); saveProfiles(np);
    const bytes = await idbGet(headshotKeyFor(active));
    if (bytes) { await idbPut(headshotKeyFor(name), bytes); await idbDel(headshotKeyFor(active)); }
    setActiveState(name); persistActive(name);
  };
  const onDeleteProfile = async () => {
    const names = Object.keys(profiles);
    if (names.length <= 1) return;
    if (!confirm(`Delete "${active}"? This cannot be undone.`)) return;
    const np = { ...profiles };
    delete np[active];
    setProfiles(np); saveProfiles(np);
    await idbDel(headshotKeyFor(active));
    const next = Object.keys(np)[0];
    setActiveState(next); persistActive(next);
    setCv(deepMerge(SEED_CV, np[next].cv));
  };

  const noop = () => {};
  let mainContent;
  if (viewingSnapshot) {
    const snapCv = viewingSnapshot.cv;
    if (viewingSnapshot.doc === 'letter') {
      mainContent = <CoverLetterDocument cv={snapCv} update={noop} />;
    } else {
      mainContent = (
        <CVDocument
          cv={snapCv} update={noop}
          headshotSrc={viewingSnapshot.headshotSrc}
          onHeadshotSrc={noop}
          onHeadshotTransform={noop}
          onHeadshotClear={noop}
        />
      );
    }
  } else if (doc === 'applications') {
    mainContent = (
      <ApplicationsDocument
        apps={apps} setApps={setApps}
        cv={cv} headshotSrc={headshotSrc} activeProfile={active}
        profiles={profiles}
        onView={setViewingSnapshot}
        onCreate={onCreateApplication}
      />
    );
  } else if (doc === 'letter') {
    mainContent = <CoverLetterDocument cv={cv} update={update} />;
  } else {
    mainContent = (
      <CVDocument
        cv={cv} update={update}
        headshotSrc={headshotSrc}
        onHeadshotSrc={onHeadshotSrc}
        onHeadshotTransform={onHeadshotTransform}
        onHeadshotClear={onHeadshotClear}
      />
    );
  }

  return (
    <>
      <Toolbar editOn={editOn} setEditOn={setEditOn}
        onPrint={onPrint} onExport={onExport} onImport={onImport} onReset={onReset}
        profiles={profiles} active={active}
        onSwitchProfile={onSwitchProfile} onSaveAs={onSaveAs}
        onRename={onRename} onDeleteProfile={onDeleteProfile}
        doc={doc} setDoc={setDoc} appsCount={apps.length}
        viewingSnapshot={!!viewingSnapshot} />
      {viewingSnapshot && <SnapshotBanner snap={viewingSnapshot} onClose={() => setViewingSnapshot(null)} />}
      <div className="cv-stage">
        {mainContent}
      </div>
      {doc === 'cv' && !viewingSnapshot && <TweaksPanel editOn={editOn} cv={cv} update={update} headshotSrc={headshotSrc} />}
    </>
  );
}

// Initialize global edit flag before first render so Ed sees it
window.__EDIT_ON = (localStorage.getItem('cv-edit-on') !== '0');
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
